# SPDX-License-Identifier: CC-BY-4.0
rest:
  listen: ":8080"
  maxBodyBytes: 1048576
  requestTimeout: 60s

admin:
  enabled: true
  listen: ":9091"
  token: "demo-admin-token-change-me"

duckdb:
  memoryLimit: "1GB"
  threads: 4
  maxOpen: 4
  maxIdle: 2

datasources:
  failFast: true

policies:
  directory: "./policies.d"
  reload: true

audit:
  file:
    path: "./data/audit"
    rotateDaily: true
    rotateSizeMB: 64
    genesis: "secret://env/SLUICE_AUDIT_GENESIS"

identity:
  apiKeyPepper: "secret://env/SLUICE_APIKEY_PEPPER"

logging:
  level: "info"
  format: "json"

limits:
  maxRows: 10000
  maxSqlBytes: 65536
  queryTimeout: 30s
  maxConcurrent: 16
