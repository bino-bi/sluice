apiVersion: sluice.bino.bi/v1alpha1
kind: SubjectBinding
metadata:
  name: analyst
spec:
  claims:
    subjectId: "cross-analyst"
    groups: "groups"
  apiKeys:
    # The presented header "X-Api-Key: sl_demo_analyst.supersecret"
    # splits on the last "." — everything before it is the keyID, so
    # id here must match the full prefix.
    - id: "sl_demo_analyst"
      # hex(HMAC-SHA256(pepper, "sl_demo_analyst:supersecret"))
      hashRef: "secret://env/SLUICE_APIKEY_ANALYST_HASH"
      groups: ["analytics"]
