# Sluice server configuration for the mcp-agent example. REST is still
# enabled for health probes; MCP is configured for stdio so a local
# agent (@modelcontextprotocol/inspector or Claude Desktop) can spawn
# `sluice serve` as a child process and talk MCP over stdin/stdout.

rest:
  listen: ":8080"
  maxBodyBytes: 1048576
  requestTimeout: 30s

mcp:
  enabled: true
  transport: "stdio"
  sessionIdleMax: 30m

admin:
  enabled: false

duckdb:
  memoryLimit: "512MB"
  threads: 2
  maxOpen: 4
  maxIdle: 2

datasources:
  failFast: true

policies:
  directory: "./policies.d"
  reload: true

audit:
  file:
    path: "./data/audit"
    rotateDaily: true
    rotateSizeMB: 64
    genesis: "secret://env/SLUICE_AUDIT_GENESIS"

identity:
  # The stdio transport inherits the parent process's environment; the
  # composition root synthesises an anonymous UserCtx with whatever
  # groups are configured via SLUICE_MCP_GROUPS (comma-separated) so
  # local-only agent sessions don't need a real authenticator. Never
  # expose the Streamable HTTP transport without a real Identifier.
  apiKeyPepper: "secret://env/SLUICE_APIKEY_PEPPER"

logging:
  level: "info"
  format: "json"

limits:
  maxRows: 1000
  maxSqlBytes: 65536
  queryTimeout: 15s
  maxConcurrent: 8
