services:
  sluice:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: sluice:break-glass
    container_name: break-glass-sluice
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      SLUICE_APIKEY_PEPPER: "break-glass-demo-pepper"
      SLUICE_AUDIT_GENESIS: "break-glass-demo-genesis"
      # hex(HMAC-SHA256(pepper, "<id>:<material>")) — same values printed by
      #   sluice apikey hash --pepper break-glass-demo-pepper \
      #                      --id sl_demo_analyst --material supersecret
      # (and --id sl_demo_sre --material rotatedtoken for the SRE key).
      SLUICE_APIKEY_ANALYST_HASH: "dced9bb29254120456acf83a91a38f5fe6109ca8f02c9a5f0547086956f797f0"
      SLUICE_APIKEY_SRE_HASH:     "6b20dbd5b12867e621979127a95f18ccaccc5e5ef5af042c07c2f611dd966b09"
    volumes:
      - ./server.yaml:/etc/sluice/server.yaml:ro
      - ./policies.d:/etc/sluice/policies.d:ro
      - ./data:/data
    working_dir: /etc/sluice
    command:
      - "serve"
      - "--config=/etc/sluice/server.yaml"
      - "--policies-dir=/etc/sluice/policies.d"
    restart: unless-stopped
