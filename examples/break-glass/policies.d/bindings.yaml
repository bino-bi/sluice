# SPDX-License-Identifier: CC-BY-4.0
# Two callers: a regular analyst and an SRE on call. The difference is
# only in the `groups` claim attached to the API key. That one-claim
# change flips the ColumnMaskPolicy off for this subject — without any
# change to the table, the caller identity, or the SQL.
apiVersion: sluice.bino.bi/v1alpha1
kind: SubjectBinding
metadata:
  name: break-glass
spec:
  claims:
    subjectId: "subjectId"
    groups: "groups"
  apiKeys:
    - id: "analyst"
      hashRef: "secret://env/SLUICE_APIKEY_ANALYST_HASH"
      groups: ["analytics"]
      claims:
        subjectId: "day-to-day-analyst"
    - id: "sre"
      hashRef: "secret://env/SLUICE_APIKEY_SRE_HASH"
      # `sre` is the break-glass group. Every caller with this group
      # bypasses the PII masks and gets an additional audit record
      # tagged with `subject.groups=["sre"]` so the incident team can
      # review every elevated query after the fact.
      groups: ["analytics", "sre"]
      claims:
        subjectId: "on-call-sre"
