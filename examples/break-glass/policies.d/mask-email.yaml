# Default mask for the analytics group: email → null. The `exclude`
# clause carves `sre` out, so break-glass callers see the real value.
# A separate audit record tags every elevated query, so opening the
# break-glass is never silent.
apiVersion: sluice.bino.bi/v1alpha1
kind: ColumnMaskPolicy
metadata:
  name: mask-email
  priority: 50
spec:
  match:
    any:
      - subjects:
          groups: ["analytics"]
        resources:
          catalogs: ["shop"]
          schemas: ["main"]
          tables: ["customers"]
          columns: ["email"]
  exclude:
    any:
      - subjects:
          groups: ["sre"]
  mask:
    type: "null"
