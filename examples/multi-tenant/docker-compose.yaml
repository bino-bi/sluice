services:
  sluice:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: sluice:multi-tenant
    container_name: multi-tenant-sluice
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      SLUICE_APIKEY_PEPPER: "multi-tenant-demo-pepper"
      SLUICE_AUDIT_GENESIS: "multi-tenant-demo-genesis"
      # hex(HMAC-SHA256(pepper, "<id>:<material>")) — same values printed by
      #   sluice apikey hash --pepper multi-tenant-demo-pepper \
      #                      --id sl_demo_acme --material supersecret
      # (and --id sl_demo_beta for the second key).
      SLUICE_APIKEY_ACME_HASH: "5b42d0c29c4c20b5e7b0d67392a0aafbb18ac33355cdd2d432738230e09365ea"
      SLUICE_APIKEY_BETA_HASH: "04fdc1c07ea3005824b81762e4d5e608a4d10a5a96db9003b6c0b68090b6b04a"
    volumes:
      - ./server.yaml:/etc/sluice/server.yaml:ro
      - ./policies.d:/etc/sluice/policies.d:ro
      - ./data:/data
    working_dir: /etc/sluice
    command:
      - "serve"
      - "--config=/etc/sluice/server.yaml"
      - "--policies-dir=/etc/sluice/policies.d"
    restart: unless-stopped
