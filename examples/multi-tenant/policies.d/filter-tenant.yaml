# SPDX-License-Identifier: CC-BY-4.0
# One row filter, two callers. `{{ subject.tenantId }}` binds to a
# positional parameter at rewrite time, so the same policy isolates
# acme rows for the acme key and beta rows for the beta key.
apiVersion: sluice.bino.bi/v1alpha1
kind: RowFilterPolicy
metadata:
  name: filter-tenant
  priority: 80
spec:
  match:
    any:
      - resources:
          catalogs: ["shop"]
          schemas: ["main"]
          tables: ["customers", "orders"]
  combine: restrictive
  filter:
    predicate:
      column: tenant_id
      op: Equals
      value: "{{ subject.tenantId }}"
