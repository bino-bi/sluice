# ssn → constant "REDACTED". This is the strongest mask short of `null`:
# the value is an opaque placeholder that cannot be reversed even with
# access to the corpus. For production workloads prefer the `hash`
# provider (v0.2) which preserves joinability without leaking plaintext.
apiVersion: sluice.bino.bi/v1alpha1
kind: ColumnMaskPolicy
metadata:
  name: mask-ssn
  priority: 100
spec:
  match:
    any:
      - resources:
          tables: ["shop.main.customers"]
          columns: ["ssn"]
  mask:
    type: "constant"
    args:
      value: "REDACTED"
