# SPDX-License-Identifier: CC-BY-4.0
# phone → constant "+1-555-REDACTED". Demonstrates that a constant mask
# preserves column type so downstream consumers (BI tools, CSV exports)
# don't see a schema change.
apiVersion: sluice.bino.bi/v1alpha1
kind: ColumnMaskPolicy
metadata:
  name: mask-phone
  priority: 80
spec:
  match:
    any:
      - resources:
          tables: ["shop.main.customers"]
          columns: ["phone"]
  mask:
    type: "constant"
    args:
      value: "+1-555-REDACTED"
