apiVersion: sluice.bino.bi/v1alpha1
kind: SqlAccessPolicy
metadata:
  name: allow-all
  priority: 0
spec:
  effect: allow
  match:
    any:
      - resources:
          tables: ["*"]
---
apiVersion: sluice.bino.bi/v1alpha1
kind: RowFilterPolicy
metadata:
  name: rls-person
  priority: 50
spec:
  match:
    any:
      - resources:
          catalogs: ["pg"]
          tables: ["person"]
  filter:
    predicate:
      column: tenant_id
      op: Equals
      value: "{{ subject.tenant_id }}"
---
apiVersion: sluice.bino.bi/v1alpha1
kind: RowFilterPolicy
metadata:
  name: rls-compensation
  priority: 50
spec:
  match:
    any:
      - resources:
          catalogs: ["mysql_erp"]
          tables: ["compensation"]
  filter:
    predicate:
      column: tenant_id
      op: Equals
      value: "{{ subject.tenant_id }}"
