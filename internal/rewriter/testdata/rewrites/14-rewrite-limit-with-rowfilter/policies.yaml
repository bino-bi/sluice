apiVersion: sluice.bino.bi/v1alpha1
kind: SqlAccessPolicy
metadata:
  name: allow-all
  priority: 0
spec:
  effect: allow
  match:
    any:
      - resources:
          tables: ["*"]
---
apiVersion: sluice.bino.bi/v1alpha1
kind: RowFilterPolicy
metadata:
  name: tenant-isolation
  priority: 50
spec:
  match:
    any:
      - resources:
          tables: ["orders"]
  filter:
    predicate:
      column: tenant_id
      op: Equals
      value: "{{ subject.tenant_id }}"
---
apiVersion: sluice.bino.bi/v1alpha1
kind: QueryRewritePolicy
metadata:
  name: cap-rows
  priority: 40
spec:
  match:
    any:
      - resources:
          tables: ["*"]
  rewrite:
    limit:
      max: 500
