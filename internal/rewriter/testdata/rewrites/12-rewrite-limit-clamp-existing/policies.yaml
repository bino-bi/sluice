apiVersion: sluice.bino.bi/v1alpha1
kind: SqlAccessPolicy
metadata:
  name: allow-all
  priority: 0
spec:
  effect: allow
  match:
    any:
      - resources:
          tables: ["*"]
---
apiVersion: sluice.bino.bi/v1alpha1
kind: QueryRewritePolicy
metadata:
  name: cap-rows
  priority: 50
spec:
  match:
    any:
      - resources:
          tables: ["*"]
  rewrite:
    limit:
      max: 1000
