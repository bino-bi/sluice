name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # goreleaser creates the GitHub release
  packages: write       # push ghcr.io images
  id-token: write       # cosign keyless OIDC
  attestations: write   # SLSA provenance

jobs:
  release:
    name: goreleaser (multi-arch + cosign + SBOM)
    runs-on: ubuntu-latest
    # goreleaser-cross ships all the CGO toolchains (glibc/arm64, macOS SDK,
    # mingw) so one container produces every archive in .goreleaser.yaml.
    container:
      image: ghcr.io/goreleaser/goreleaser-cross:v1.25
      options: --user root
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe (goreleaser-cross runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        run: goreleaser release --clean

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/*.sig
            dist/*.pem
            dist/*.sbom.cdx.json

  slsa-provenance:
    # Generates SLSA v1.0 provenance for the checksums file so every archive
    # inherits a verifiable build-origin attestation.
    needs: [release]
    permissions:
      contents: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
